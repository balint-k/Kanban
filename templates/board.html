<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Kanban</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>KanBan board</h1>
    </header>
    <div class="board">
        {% for column in columns %}
        <div class="column">
            <h2>
                {{ column.name }}
                <form method="post" action="/delete_column" style="display:inline;">
                    <input type="hidden" name="column_id" value="{{ column.id }}">
                    <button type="submit" class="delete-column-btn" title="Delete Column">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="vertical-align:middle;">
                            <path d="M3 6h18M8 6v12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V6m-6 0V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2" stroke="#1976d2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </form>
            </h2>
            <div class="cards">
                <!-- Cards would go here -->
                 {% for task in column.tasks %}
                    <div class="card">
                        <span class="delete-task-btn" title="Delete Task" onclick="deleteTask({{ task.id }})">&times;</span>
                        <div class="card-title">{{ task.title }}</div>
                        <div class="card-description">{{ task.description }}</div>
                    </div>
                 {% endfor %}
                 <button class="add-task-btn" onclick="addTask({{ column.id }})">+</button>
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Plus Button -->
    <button id="addColumnBtn" class="add-column-btn" title="Add Column">+</button>

    <!-- AddTaskModal-->
    <div id="addTaskModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeTaskModal">&times;</span>
            <form id="addTaskForm" method="post" action="/add_task">
                <input type="text" id="taskTitle" name="title" placeholder="Task Title" required>
                <textarea id="taskDescription" name="description" placeholder="Description" required></textarea>
                <button type="submit">Add</button>
                <input type="hidden" id="taskColumnId" name="column_id">
            </form>
        </div>
    </div>
    

    <!-- AddColumnModal -->
    <div id="addColumnModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeColumnModal">&times;</span>
            <form id="addColumnForm" method="post" action="/add_column">
                <input type="text" id="columnName" name="name" placeholder="Column name" required>
                <button type="submit">Add</button>
            </form>
        </div>
    </div>

</body>
<script src="{{ url_for('static', filename='modal.js') }}"></script>
</html>
