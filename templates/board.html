<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Kanban</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>KanBan board</h1>
    </header>
    <div class="board">
        {% for column in columns %}
        <div class="column">
            <h2>{{ column.name }}</h2>
            
        </div>
        {% endfor %}
    </div>

    <!-- Plus Button -->
    <button id="addColumnBtn" class="add-column-btn" title="Add Column">+</button>

    <!-- Modal -->
    <div id="addColumnModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <form id="addColumnForm" method="post" action="/add_column">
          <label for="columnName">Column Name:</label>
          <input type="text" id="columnName" name="name" required>
          <button type="submit">Add</button>
        </form>
      </div>
    </div>
</body>
<script src="{{ url_for('static', filename='modal.js') }}"></script>
</html>
